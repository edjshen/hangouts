<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangouts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --bg2: #111; --text: #fff; --muted: #888; --on: #22c55e; --off: #6b7280; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
    header { background: var(--bg2); border-bottom: 1px solid #222; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .tabs { display: flex; gap: 0.5rem; }
    .tabs button { flex: 1; padding: 0.75rem; background: transparent; border: 1px solid #333; color: var(--muted); border-radius: 8px; cursor: pointer; }
    .tabs button.active { background: var(--on); border-color: var(--on); color: white; }
    main { padding: 1rem; }
    .tab { display: none; }
    .tab.active { display: block; }
    .status-card { text-align: center; padding: 3rem 1rem; }
    .status-btn { display: inline-flex; align-items: center; gap: 1rem; padding: 1.5rem 3rem; font-size: 1.25rem; font-weight: 600; border: none; border-radius: 100px; cursor: pointer; margin: 2rem 0; }
    .status-btn.online { background: var(--on); color: white; }
    .status-btn.offline { background: var(--bg2); color: var(--muted); border: 2px solid #333; }
    .dot { width: 16px; height: 16px; border-radius: 50%; background: currentColor; }
    .friend { display: flex; align-items: center; gap: 1rem; background: var(--bg2); padding: 1rem; border-radius: 12px; margin-bottom: 0.75rem; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 600; background: #333; }
    .avatar.online { background: rgba(34,197,94,0.2); color: var(--on); }
    .name { font-weight: 600; }
    .status-text { font-size: 0.875rem; color: var(--muted); }
    .status-text.online { color: var(--on); }
    #map { width: 100%; height: 60vh; border-radius: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Hangouts</h1>
    <div class="tabs">
      <button class="active" onclick="showTab('status')">Status</button>
      <button onclick="showTab('friends')">Friends</button>
      <button onclick="showTab('map')">Map</button>
    </div>
  </header>
  <main>
    <div id="status" class="tab active">
      <div class="status-card">
        <h2 id="username">You</h2>
        <button id="statusBtn" class="status-btn offline" onclick="toggleStatus()">
          <span class="dot"></span>
          <span id="statusText">Not Available</span>
        </button>
        <p style="color: var(--muted)">Toggle when you want to hang out with friends</p>
      </div>
    </div>
    <div id="friends" class="tab">
      <div id="friendsList"></div>
    </div>
    <div id="map" class="tab">
      <div id="map" style="background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: var(--muted);">
        Map loading...
      </div>
    </div>
  </main>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const API = window.location.origin;
    let userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('userId', userId);
    let status = 'OFFLINE';
    let socket;
    
    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'friends') loadFriends();
      if (name === 'map') initMap();
    }
    
    function toggleStatus() {
      status = status === 'ONLINE' ? 'OFFLINE' : 'ONLINE';
      updateStatusUI();
      
      if (status === 'ONLINE' && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          fetch(`${API}/api/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userId}` },
            body: JSON.stringify({ status, lat: pos.coords.latitude, lng: pos.coords.longitude })
          });
        });
      } else {
        fetch(`${API}/api/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${userId}` },
          body: JSON.stringify({ status })
        });
      }
    }
    
    function updateStatusUI() {
      const btn = document.getElementById('statusBtn');
      const txt = document.getElementById('statusText');
      btn.className = 'status-btn ' + status.toLowerCase();
      txt.textContent = status === 'ONLINE' ? 'Open to Hangout' : 'Not Available';
    }
    
    async function loadFriends() {
      try {
        const res = await fetch(`${API}/api/friends`, { headers: { 'Authorization': `Bearer ${userId}` } });
        const friends = await res.json();
        const html = friends.map(f => `
          <div class="friend">
            <div class="avatar ${f.status.toLowerCase()}">${f.name[0]}</div>
            <div>
              <div class="name">${f.name}</div>
              <div class="status-text ${f.status.toLowerCase()}">${f.status === 'ONLINE' ? '● Open to Hangout' : '○ Offline'}</div>
            </div>
          </div>
        `).join('');
        document.getElementById('friendsList').innerHTML = html || '<p style="color: var(--muted); text-align: center;">No friends yet</p>';
      } catch (e) {
        // Demo data
        document.getElementById('friendsList').innerHTML = `
          <div class="friend"><div class="avatar online">A</div><div><div class="name">Alice</div><div class="status-text online">● Open to Hangout</div></div></div>
          <div class="friend"><div class="avatar offline">B</div><div><div class="name">Bob</div><div class="status-text offline">○ Offline</div></div></div>
        `;
      }
    }
    
    function initMap() {
      const mapDiv = document.getElementById('map');
      mapDiv.innerHTML = `
        <div style="padding: 1rem; background: var(--bg2); border-radius: 8px; margin-bottom: 1rem;">
          <h3 style="margin-bottom: 0.5rem;">📍 Location Access</h3>
          <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem;">
            Allow location access to share your position with friends and discover new places.
          </p>
          <button onclick="requestLocation()" style="padding: 0.75rem 1.5rem; background: var(--on); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600;">
            Share My Location
          </button>
          <p id="locStatus" style="margin-top: 0.75rem; font-size: 0.875rem;"></p>
        </div>
        <div id="mapCanvas" style="width: 100%; height: 400px; background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted);">
          Map will load after location access
        </div>
      `;
      
      // Try to get location automatically
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            document.getElementById('locStatus').innerHTML = 
              `<span style="color: var(--on);">✓ Location active: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}</span>`;
            loadFriendHomes();
          },
          err => {
            document.getElementById('locStatus').innerHTML = 
              `<span style="color: #f59e0b;">⚠ Location not shared: ${err.message}</span>`;
          }
        );
      }
    }
    
    function requestLocation() {
      if (!navigator.geolocation) {
        document.getElementById('locStatus').innerHTML = 'Geolocation not supported';
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          
          // Send to server
          fetch(`${API}/api/status`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${userId}`
            },
            body: JSON.stringify({ status, lat: latitude, lng: longitude })
          });
          
          document.getElementById('locStatus').innerHTML = 
            `<span style="color: var(--on);">✓ Location shared: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}</span>`;
          
          loadFriendHomes();
        },
        err => {
          document.getElementById('locStatus').innerHTML = 
            `<span style="color: #ef4444;">✗ Error: ${err.message}</span>`;
        }
      );
    }
    
    async function loadFriendHomes() {
      try {
        const res = await fetch(`${API}/api/brain/homes`, {
          headers: { 'Authorization': `Bearer ${userId}` }
        });
        const homes = await res.json();
        
        const mapCanvas = document.getElementById('mapCanvas');
        if (Object.keys(homes).length === 0) {
          mapCanvas.innerHTML = '<p>No friend home locations saved yet</p>';
          return;
        }
        
        let html = '<div style="padding: 1rem; width: 100%;"><h4 style="margin-bottom: 1rem;">Friend Home Locations (Encrypted Brain)</h4>';
        for (const [id, home] of Object.entries(homes)) {
          html += `
            <div style="background: rgba(34,197,94,0.1); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; border-left: 3px solid var(--on);">
              <strong>Friend ${id.slice(0, 8)}...</strong><br>
              <span style="color: var(--muted); font-size: 0.875rem;">
                📍 ${home.lat?.toFixed(4)}, ${home.lng?.toFixed(4)}
                ${home.address ? `<br>🏠 ${home.address}` : ''}
              </span>
            </div>
          `;
        }
        html += '</div>';
        mapCanvas.innerHTML = html;
      } catch (e) {
        console.log('Brain homes not available');
      }
    }
    
    // Init
    socket = io(API);
    socket.emit('join', userId);
  </script>
</body>
</html>
